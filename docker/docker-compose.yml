version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: papercrown-db
    environment:
      POSTGRES_DB: papercrown
      POSTGRES_USER: papercrown
      POSTGRES_PASSWORD: papercrown
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papercrown"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: papercrown-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@papercrown.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
